name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: true

      - name: Setup Android SDK
        uses: amyu/setup-android@v5
        with:
          sdk-version: 36
          build-tools-version: 36.1.0
          ndk-version: 29.0.14206865

      - name: Generate debug keystore
        run: keytool -genkey -v -keystore debug.keystore -storepass android -keypass android -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storetype JKS -dname "CN=Android Debug,O=Android,C=US"

      - name: Initialize Godot project
        run: godot --headless --path . --editor --quit

      - name: Extract AAR dependencies
        run: |
          TEMPLATES=$(find $HOME/.local/share/godot/export_templates/4.6.3.stable -name "android_source.zip" 2>/dev/null | head -1)
          if [ -z "$TEMPLATES" ]; then
            echo "ERROR: android_source.zip not found in export templates"
            find $HOME/.local/share/godot/export_templates/4.6.3.stable -type f | head -20
            exit 1
          fi
          mkdir -p /tmp/godot_android_source
          unzip -q -o "$TEMPLATES" -d /tmp/godot_android_source
          mkdir -p android/build/libs/debug android/build/libs/release
          cp /tmp/godot_android_source/libs/debug/*.aar android/build/libs/debug/ 2>/dev/null || true
          cp /tmp/godot_android_source/libs/release/*.aar android/build/libs/release/ 2>/dev/null || true

      - name: Copy plugin source
        run: |
          mkdir -p android/build/src/main/java/com/catwalk/stepcounter
          cp android/plugins/step_counter/StepCounterPlugin.kt android/build/src/main/java/com/catwalk/stepcounter/

      - name: Clean duplicate resources
        run: find android/build/res -name "*.png" -delete

      - name: Export APK
        run: |
          godot --headless --path . --export-debug "Android Debug" catwalk-debug.apk
          [ -f catwalk-debug.apk ] || { echo "ERROR: APK not generated"; exit 1; }
          echo "APK exported: $(ls -lh catwalk-debug.apk)"

      - name: Inject plugin registration
        shell: bash
        run: |
          set -e
          mkdir -p /tmp/apk_work
          cd /tmp/apk_work
          unzip -q -o "$GITHUB_WORKSPACE/catwalk-debug.apk"
          mkdir -p assets/.godot assets/addons/step_counter
          mkdir -p assets/android/plugins/step_counter
          printf 'res://addons/step_counter/StepCounter.gdextension\nres://android/plugins/step_counter/StepCounter.gdextension\n' > assets/.godot/extension_list.cfg
          printf '[configuration]\n\nandroid_plugin_name="StepCounter"\nandroid_plugin_type="v2"\nandroid_plugin_binary_type="local"\nandroid_plugin_binary="com/catwalk/stepcounter/StepCounterPlugin.kt"\n' > assets/addons/step_counter/StepCounter.gdextension
          cp assets/addons/step_counter/StepCounter.gdextension assets/android/plugins/step_counter/StepCounter.gdextension
          zip -r -q "$GITHUB_WORKSPACE/catwalk-debug.apk" .
          echo "Plugin registration injected"

      - name: Sign APK
        run: |
          ${ANDROID_SDK_ROOT}/build-tools/36.1.0/apksigner sign --ks debug.keystore --ks-pass pass:android --ks-key-alias debug --key-pass pass:android catwalk-debug.apk
          echo "Signed: $(ls -lh catwalk-debug.apk)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: catwalk-debug-apk
          path: catwalk-debug.apk
          if-no-files-found: error
