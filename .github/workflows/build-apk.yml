name: Build APK

on:
  push:
    branches:
      - godot-prototype

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: true

      - name: Setup Android SDK
        uses: amyu/setup-android@v5
        with:
          sdk-version: 36
          build-tools-version: 36.1.0
          ndk-version: 29.0.14206865

      - name: Initialize Godot
        run: godot --headless --path . --editor --quit

      - name: Extract AAR
        run: |
          ZIP=$(find $HOME/.local/share/godot -name "android_source.zip" | head -1)
          unzip -q -o "$ZIP" -d /tmp/ga
          mkdir -p android/build/libs/debug android/build/libs/release
          cp /tmp/ga/libs/debug/*.aar android/build/libs/debug/ 2>/dev/null || true
          cp /tmp/ga/libs/release/*.aar android/build/libs/release/ 2>/dev/null || true

      - name: Copy plugin
        run: |
          mkdir -p android/build/src/main/java/com/catwalk/stepcounter
          cp android/plugins/step_counter/StepCounterPlugin.kt android/build/src/main/java/com/catwalk/stepcounter/

      - name: Build APK
        run: cd android/build && chmod +x gradlew && ./gradlew assembleStandardDebug
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: catwalk-debug-apk
          path: android/build/outputs/apk/**/*.apk
