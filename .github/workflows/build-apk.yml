name: Build APK

on:
  push:
    branches:
      - godot-prototype

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: true

      - name: Setup Android SDK
        uses: amyu/setup-android@v5
        with:
          sdk-version: 34
          build-tools-version: 34.0.0

      - name: Export APK
        run: |
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          godot --headless --path . --export-release "Android Debug" catwalk-debug.apk 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: catwalk-debug-apk
          path: catwalk-debug.apk
