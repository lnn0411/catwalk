name: Build APK

on:
  push:
    branches:
      - godot-prototype

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: true

      - name: Setup Android SDK
        uses: amyu/setup-android@v5
        with:
          sdk-version: 36
          build-tools-version: 36.1.0
          ndk-version: 29.0.14206865

      - name: Initialize Godot build template
        run: godot --headless --path . --editor --quit

      - name: Copy plugin + icon resources
        run: |
          mkdir -p android/build/src/main/java/com/catwalk/stepcounter
          cp android/plugins/step_counter/StepCounterPlugin.kt android/build/src/main/java/com/catwalk/stepcounter/
          # godot init should create res dirs, add our icons if missing
          mkdir -p android/build/res
          cp -r android/build/res/* . 2>/dev/null || true

      - name: Gradle build APK
        run: |
          export ANDROID_SDK_ROOT="${ANDROID_HOME}"
          cd android/build
          ./gradlew assembleStandardDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: catwalk-step-counter-debug-apk
          path: android/build/outputs/apk/standard/debug/*.apk
