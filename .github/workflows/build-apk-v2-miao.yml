name: Build APK (喵酱版)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ═══ #1 关键文件保护 ═══
      - name: 🔒 关键文件完整性检查
        run: |
          errors=0

          echo "── StepCounterPlugin.kt ──"
          F="android/plugins/step_counter/StepCounterPlugin.kt"
          if [ ! -f "$F" ]; then echo "❌ 不存在"; errors=$((errors+1))
          else
            for kw in onSensorChanged onAccuracyChanged getSteps rawSensorSteps; do
              grep -q "$kw" "$F" || { echo "❌ 缺少 $kw"; errors=$((errors+1)); }
            done
            [ $errors -eq 0 ] && echo "✅ StepCounterPlugin.kt"
          fi

          echo "── AndroidManifest.xml ──"
          F="android/build/src/main/AndroidManifest.xml"
          if [ ! -f "$F" ]; then echo "❌ 不存在"; errors=$((errors+1))
          else
            for kw in ACTIVITY_RECOGNITION FOREGROUND_SERVICE; do
              grep -q "$kw" "$F" || { echo "❌ 缺少 $kw"; errors=$((errors+1)); }
            done
            [ $errors -eq 0 ] && echo "✅ AndroidManifest.xml"
          fi

          echo "── step_counter.gdap ──"
          F="android/plugins/step_counter/step_counter.gdap"
          if [ ! -f "$F" ]; then echo "❌ 不存在"; errors=$((errors+1))
          else
            grep -q "StepCounter" "$F" || { echo "❌ 缺少 StepCounter"; errors=$((errors+1)); }
            [ $errors -eq 0 ] && echo "✅ step_counter.gdap"
          fi

          echo "── export_presets.cfg ──"
          F="export_presets.cfg"
          if [ ! -f "$F" ]; then echo "❌ 不存在"; errors=$((errors+1))
          else
            for kw in "package/signed=true" "gradle_build/use_gradle_build=true"; do
              grep -q "$kw" "$F" || { echo "❌ 缺少 $kw"; errors=$((errors+1)); }
            done
            [ $errors -eq 0 ] && echo "✅ export_presets.cfg"
          fi

          if [ $errors -gt 0 ]; then
            echo ""
            echo "🔴 $errors 个关键检查失败，停止打包！"
            exit 1
          fi
          echo "🔒 全部 4 个文件检查通过"

      # ═══ #3 传感器代码变更检测 ═══
      - name: ⚠️ 传感器代码变更检测
        run: |
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q "StepCounterPlugin.kt"; then
            echo "⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️"
            echo "⚠️ 传感器代码 (StepCounterPlugin.kt) 已变更！"
            echo "⚠️ 需真机复测:"
            echo "⚠️   1. 统计步数"
            echo "⚠️   3. 杀进程重开步数不归零"
            echo "⚠️   4. 最小化后继续计步"
            echo "⚠️   5. 健康授权（手动）"
            echo "⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️"
          else
            echo "✅ 传感器代码无变更"
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: true

      - uses: amyu/setup-android@v5
        with:
          sdk-version: 36
          build-tools-version: 36.1.0
          ndk-version: 29.0.14206865

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -keypass android \
            -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storetype JKS \
            -dname "CN=Android Debug,O=Android,C=US"

      # ═══ FIX: 先解压模板，再让 editor 追加插件依赖 ═══
      - name: Extract Android template
        run: |
          ZIP=$(find $HOME/.local/share/godot/export_templates/4.6.3.stable \
            -name "android_source.zip" | head -1)
          unzip -qo "$ZIP" -d android/build/
          echo "✅ 模板已解压"

      - name: Extract AAR
        run: |
          ZIP=$(find $HOME/.local/share/godot/export_templates/4.6.3.stable \
            -name "android_source.zip" | head -1)
          mkdir -p /tmp/ga android/build/libs/debug
          unzip -qo "$ZIP" -d /tmp/ga
          cp /tmp/ga/libs/debug/*.aar android/build/libs/debug/ 2>/dev/null || true

      - name: Copy plugin source
        run: |
          mkdir -p android/build/src/main/java/com/catwalk/stepcounter
          cp android/plugins/step_counter/StepCounterPlugin.kt \
             android/build/src/main/java/com/catwalk/stepcounter/

      - name: Clean duplicate res
        run: find android/build/res \( -name "*.png" -o -name "*.webp" \) -delete

      - name: Set compress_native_libraries=true and disable Godot signing
        run: |
          sed -i 's/gradle_build\/compress_native_libraries=false/gradle_build\/compress_native_libraries=true/' export_presets.cfg
          sed -i 's/package\/signed=true/package\/signed=false/' export_presets.cfg
          sed -i '/keystore\/debug/d' export_presets.cfg
          grep "compress_native_libraries=true" export_presets.cfg || echo "⚠️ compress_native_libraries 检查"
          grep "package/signed=false" export_presets.cfg && echo "✅ Godot signing disabled" || echo "❌ 禁用签名失败"

      - name: Export APK
        run: |
          rm -f catwalk-debug.apk
          # 第一阶段：单线程导入（避免 CSV 后台线程 crash）
          godot --headless --editor --quit 2>&1 || true
          # 清理编辑器重新生成的图片（防止 png+webp 重复冲突）
          find android/build/res \( -name "*.png" -o -name "*.webp" \) -delete 2>/dev/null || true
          # 手动添加权限到 AndroidManifest（模板不带 FOREGROUND_SERVICE）
          grep -q "FOREGROUND_SERVICE" android/build/src/main/AndroidManifest.xml || \
            sed -i "/<supports-screens/i\\    <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE\" />" android/build/src/main/AndroidManifest.xml
          grep -q "ACTIVITY_RECOGNITION" android/build/src/main/AndroidManifest.xml || \
            sed -i "/<supports-screens/i\\    <uses-permission android:name=\"android.permission.ACTIVITY_RECOGNITION\" />" android/build/src/main/AndroidManifest.xml
          grep -q "health.connect" android/build/build.gradle || \
            sed -i "/^dependencies {/a\\    implementation 'androidx.health.connect:connect-client:1.1.0-alpha06'" android/build/build.gradle
          # 第二阶段：正式导出
          godot --headless --export-debug "Android Debug" catwalk-debug.apk 2>&1 || true
          if [ ! -f catwalk-debug.apk ]; then
            echo "❌ APK 未生成"
            ls -la
            exit 1
          fi
          echo "✅ APK: $(ls -lh catwalk-debug.apk)"

      - name: Sign APK
        run: |
          ${ANDROID_SDK_ROOT}/build-tools/36.1.0/apksigner sign \
            --ks debug.keystore --ks-pass pass:android \
            --ks-key-alias debug --key-pass pass:android \
            --v1-signing-enabled true catwalk-debug.apk
          echo "✅ 签名完成"

      # ═══ #2 APK 自检 ═══
      - name: 🔍 APK 自检
        run: |
          APK="catwalk-debug.apk"
          ERR=0

          echo "── 签名 ──"
          ${ANDROID_SDK_ROOT}/build-tools/36.1.0/apksigner verify $APK && echo "✅ V2+V3" || { echo "❌"; ERR=$((ERR+1)); }

          echo ""
          echo "── 大小 / 压缩 ──"
          SIZE=$(du -h $APK | cut -f1)
          COMPRESS=$(unzip -lv $APK 2>/dev/null | grep libgodot | awk '{print $2}')
          echo "大小: $SIZE | libgodot: $COMPRESS"
          [ "$COMPRESS" != "Stored" ] || { echo "❌ lib 未压缩"; ERR=$((ERR+1)); }

          echo ""
          echo "── StepCounter DEX ──"
          HITS=$(for i in 1 2 3 4; do unzip -p $APK classes${i}.dex 2>/dev/null | strings | grep -c StepCounter 2>/dev/null; done | paste -sd+ | bc 2>/dev/null || echo 0)
          [ "$HITS" -ge 3 ] && echo "✅ DEX $HITS hits" || { echo "❌ 不足 ($HITS hits)"; ERR=$((ERR+1)); }

          echo ""
          echo "── Android 权限 ──"
          MANIFEST=$(unzip -p $APK AndroidManifest.xml 2>/dev/null || true)
          echo "$MANIFEST" | grep -q "ACTIVITY_RECOGNITION" && echo "✅ ACTIVITY_RECOGNITION" || { echo "❌ 缺少 ACTIVITY_RECOGNITION"; ERR=$((ERR+1)); }
          echo "$MANIFEST" | grep -q "FOREGROUND_SERVICE" && echo "✅ FOREGROUND_SERVICE" || { echo "❌ 缺少 FOREGROUND_SERVICE"; ERR=$((ERR+1)); }

          echo ""
          echo "── .gdc 脚本 ──"
          GDC=$(unzip -l $APK 2>/dev/null | grep -c "\.gdc$" || true)
          [ "$GDC" -ge 5 ] && echo "✅ gdc × $GDC" || { echo "❌ 不足 ($GDC)"; ERR=$((ERR+1)); }

          echo ""
          if [ $ERR -gt 0 ]; then
            echo "🔴 自检失败: $ERR 项"
            exit 1
          fi
          echo "🔍 自检全绿 ✅"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: catwalk-debug-apk
          path: catwalk-debug.apk
          if-no-files-found: error
